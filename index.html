<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Layout Exercise 27</title>
    <style>
        /* 基礎樣式設定 */
        body {
            background-color: #55acee;
            /* 藍色背景 */
            margin: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background-color: white;
            padding: 15px;
            border-radius: 10px;
            width: 90%;
            max-width: 800px;
        }

        /* 頂部綠色區塊 */
        .header {
            background-color: #a6d14d;
            height: 150px;
            margin-bottom: 15px;
            border-radius: 5px;
        }

        /* 中間青色區塊容器 */
        .row-middle {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
        }

        .box-cyan {
            background-color: #00bcd4;
            height: 250px;
            border-radius: 5px;
            flex: 1;
            /* 預設在寬螢幕平均分配空間 */
        }

        /* 下方淺灰色區塊容器 */
        .row-bottom {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .box-light-gray {
            background-color: #eeeeee;
            height: 120px;
            border-radius: 5px;
            flex: 1;
            /* 預設為四欄佈局 */
            min-width: 20%;
        }

        /* --- Media Query: 當寬度小於 480px 時 --- */
        @media screen and (max-width: 800px) {
            .row-middle {
                flex-direction: column;
                /* 轉為垂直堆疊 (a) */
            }

            .box-cyan {
                flex: none;
                /* 修正 flex-direction: column 時高度塌陷的問題 */
                width: 100%;
            }

            .box-light-gray {
                /* 轉為兩欄排版 (a) */
                flex: none;
                width: calc(50% - 5px);
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="header"></div>

        <div class="row-middle">
            <div class="box-cyan"></div>
            <div class="box-cyan"></div>
            <div class="box-cyan"></div>
        </div>

        <div class="row-bottom">
            <div class="box-light-gray"></div>
            <div class="box-light-gray"></div>
            <div class="box-light-gray"></div>
            <div class="box-light-gray"></div>
        </div>
    </div>

</body>

</html>
